name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        env:
          AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
          AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          NODE_ENV: production
          DATABASE_URL: ${{secrets.DATABASE_URL}}
          NEXTAUTH_SECRET: ${{secrets.NEXTAUTH_SECRET}}
          NEXTAUTH_URL: ${{secrets.NEXTAUTH_URL}}
          EMAIL_SERVER_HOST: ${{secrets.EMAIL_SERVER_HOST}}
          EMAIL_SERVER_PORT: ${{secrets.EMAIL_SERVER_PORT}}
          EMAIL_SERVER_USER: ${{secrets.EMAIL_SERVER_USER}}
          EMAIL_SERVER_PASSWORD: ${{secrets.EMAIL_SERVER_PASSWORD}}
          EMAIL_FROM: ${{secrets.EMAIL_FROM}}
          NEXTAUTH_GOOGLE_ID: ${{secrets.NEXTAUTH_GOOGLE_ID}}
          NEXTAUTH_GOOGLE_SECRET: ${{secrets.NEXTAUTH_GOOGLE_SECRET}}
          NEXTAUTH_GITHUB_ID: ${{secrets.NEXTAUTH_GITHUB_ID}}
          NEXTAUTH_GITHUB_SECRET: ${{secrets.NEXTAUTH_GITHUB_SECRET}}
          S3_HOST: ${{secrets.S3_HOST}}
          S3_REGION: ${{secrets.S3_REGION}}
          S3_BUCKET: ${{secrets.S3_BUCKET}}
          S3_ACCESS_KEY: ${{secrets.S3_ACCESS_KEY}}
          S3_ACCESS_SECRET: ${{secrets.S3_ACCESS_SECRET}}
          S3_CDN: ${{secrets.S3_CDN}}
          STRIPE_API_KEY: ${{secrets.STRIPE_API_KEY}}
          STRIPE_WEBHOOK_SECRET: ${{secrets.STRIPE_WEBHOOK_SECRET}}
          STRIPE_PRO_MONTHLY_PLAN_ID: ${{secrets.STRIPE_PRO_MONTHLY_PLAN_ID}}
          STRIPE_PRO_YEARLY_PLAN_ID: ${{secrets.STRIPE_PRO_YEARLY_PLAN_ID}}
          NEXT_PUBLIC_APP_URL: ${{secrets.NEXT_PUBLIC_APP_URL}}
        run: npm run deploy:prod
